<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Characters | ln97q_・OC</title>

    <!-- サイト全体のCSS -->
    <link
        rel="stylesheet"
        href="style.css"
    >

    <!-- キャラクター一覧ページ専用CSS -->
    <link
        rel="stylesheet"
        href="css/characters.css"
    >

    <!-- 英字用フォント -->
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
        rel="stylesheet"
    >
</head>


<body>

    <!-- サイト共通背景 -->
    <div class="background"></div>


    <main class="characters">

        <!-- ページタイトル -->
        <h1>CHARACTERS</h1>


        <!-- =========================
             CHARACTER LIST
        ========================== -->

        <div class="card-area">


            <!-- 花乃院 毬 -->
            <div class="character-card">

                <div class="character-image">
                    <img
                        src="images/mari.png"
                        alt="花乃院 毬"
                    >
                </div>

                <h2>花乃院 毬</h2>

                <p>ドジっ子サキュバス</p>

                <a
                    href="mari.html"
                    class="profile-button"
                >
                    VIEW PROFILE
                </a>

            </div>


            <!-- 御堂羽 一颯 -->
            <div class="character-card">

                <div class="character-image">
                    <img
                        src="images/ibuki.jpeg"
                        alt="御堂羽 一颯"
                    >
                </div>

                <h2>御堂羽 一颯</h2>

                <p>御堂羽組・若頭</p>

                <a
                    href="ibuki.html"
                    class="profile-button"
                >
                    VIEW PROFILE
                </a>

            </div>


            <!-- 伊ノ上 ゆき -->
            <div class="character-card">

                <div class="character-image">
                    <img
                        src="images/yuki.jpeg"
                        alt="伊ノ上 ゆき"
                    >
                </div>

                <h2>伊ノ上 ゆき</h2>

                <p>元・天才院生</p>

                <a
                    href="yuki.html"
                    class="profile-button"
                >
                    VIEW PROFILE
                </a>

            </div>


            <!-- 花乃院 栞 -->
            <div class="character-card">

                <div class="character-image">
                    <img
                        src="images/shiori.jpeg"
                        alt="花乃院 栞"
                    >
                </div>

                <h2>花乃院 栞</h2>

                <p>メンヘラインキュバス</p>

                <a
                    href="shiori.html"
                    class="profile-button"
                >
                    VIEW PROFILE
                </a>

            </div>

        </div>


        <!-- =========================
             PAIR ARCHIVE
        ========================== -->

        <section class="relationship-section">

            <h2 class="relationship-title">
                ♡ Pair Archive ♡
            </h2>

            <p class="relationship-sub">
                Click the card...
            </p>


            <div class="relationship-slider">


                <!-- =========================
                     1枚目：一颯 × 毬
                     特別デザインカード
                ========================== -->

                <a
                    href="relationship/ibuki-mari.html"
                    class="relationship-card featured-pair-card"
                >

                    <!-- 背景のキラキラ模様 -->
                    <span
                        class="featured-pair-pattern"
                        aria-hidden="true"
                    ></span>


                    <!--
                        左側：御堂羽 一颯

                        後から人物画像を入れる場合は、
                        featured-pair-placeholderを削除して、
                        下のimgタグのコメントを外します。
                    -->

                    <div
                        class="
                            featured-pair-character
                            featured-pair-character-left
                        "
                    >

                        <span class="featured-pair-placeholder">
                            IBUKI
                        </span>

                        <!--
                        <img
                            src="images/ibuki-pair.png"
                            alt="御堂羽 一颯"
                        >
                        -->

                    </div>


                    <!--
                        右側：花乃院 毬

                        後から人物画像を入れる場合は、
                        featured-pair-placeholderを削除して、
                        下のimgタグのコメントを外します。
                    -->

                    <div
                        class="
                            featured-pair-character
                            featured-pair-character-right
                        "
                    >

                        <span class="featured-pair-placeholder">
                            MARI
                        </span>

                        <!--
                        <img
                            src="images/mari-pair.png"
                            alt="花乃院 毬"
                        >
                        -->

                    </div>


                    <!-- カード中央の文章 -->
                    <div class="featured-pair-content">

                        <span class="featured-pair-category">
                            恋愛 ♡
                        </span>


                        <div class="featured-pair-name">

                            <span>
                                御堂羽 一颯
                            </span>

                            <span class="featured-pair-cross">
                                ×
                            </span>

                            <span>
                                花乃院 毬
                            </span>

                        </div>


                        <div class="featured-pair-relation">
                            冷酷若頭 × ポンコツサキュバス
                        </div>


                        <p class="featured-pair-quote">
                            「……お前、ほんまに放っとけへん」
                        </p>

                    </div>


                    <!-- =========================
                         透過PNGの装飾素材
                    ========================== -->

                    <!-- 左上のハート -->
                    <img
                        src="images/assets/heart-pink.png"
                        class="
                            featured-decoration
                            featured-heart-left
                        "
                        alt=""
                        aria-hidden="true"
                    >


                    <!-- 右下のハート -->
                    <img
                        src="images/assets/heart-pink.png"
                        class="
                            featured-decoration
                            featured-heart-right
                        "
                        alt=""
                        aria-hidden="true"
                    >


                    <!-- 右上のリボン -->
                    <img
                        src="images/assets/miniribon-pink.png"
                        class="
                            featured-decoration
                            featured-ribbon
                        "
                        alt=""
                        aria-hidden="true"
                    >


                    <!-- 左下の星 -->
                    <img
                        src="images/assets/star-pink.png"
                        class="
                            featured-decoration
                            featured-star
                        "
                        alt=""
                        aria-hidden="true"
                    >


                    <!-- 左側の月 -->
                    <img
                        src="images/assets/dot-moon.png"
                        class="
                            featured-decoration
                            featured-moon
                        "
                        alt=""
                        aria-hidden="true"
                    >


                    <!-- 右側の十字キラキラ -->
                    <img
                        src="images/assets/dot-cross.png"
                        class="
                            featured-decoration
                            featured-cross-decoration
                        "
                        alt=""
                        aria-hidden="true"
                    >

                </a>


                <!-- =========================
                     2枚目：栞 × 毬
                ========================== -->

                <a
                    href="relationship/shiori-mari.html"
                    class="relationship-card"
                >

                    <div class="pair-name">
                        花乃院 栞 × 花乃院 毬
                    </div>

                    <p>
                        兄 × 妹
                    </p>

                </a>


                <!-- =========================
                     3枚目：栞 × ゆき
                ========================== -->

                <a
                    href="relationship/shiori-yuki.html"
                    class="relationship-card"
                >

                    <div class="pair-name">
                        花乃院 栞 × 伊ノ上 ゆき
                    </div>

                    <p>
                        執着 × 幼なじみ
                    </p>

                </a>

            </div>

        </section>


        <!-- トップページへ戻る -->
        <a
            href="index.html"
            class="back"
        >
            BACK
        </a>

    </main>

</body>

</html>
